<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Страны: Пошаговая стратегия</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { 
            background: #0a2f44; 
            font-family: system-ui, sans-serif; 
            margin: 0; 
            padding: 10px; 
            color: white; 
            min-height: 100vh;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
        }
        canvas {
            background: #1e3a5f;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            touch-action: none;
            width: 100%;
            max-width: 800px;
            height: auto;
            cursor: pointer;
            aspect-ratio: 4/3;
        }
        .panel {
            background: rgba(0,0,0,0.8);
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
            width: 100%;
            backdrop-filter: blur(5px);
        }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .player-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 14px;
            font-weight: bold;
        }
        .player-info .name {
            color: #ffd700;
        }
        .turn-indicator {
            background: #ffd700;
            color: #0a2f44;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .buildings-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
        }
        .building-btn {
            background: #2c5282;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.2s;
            flex: 1 0 auto;
            max-width: 150px;
        }
        .building-btn:active { transform: scale(0.95); background: #3b6fa0; }
        .building-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
        }
        .action-buttons select, .action-buttons button {
            background: #1a365d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        .action-buttons button:active { transform: scale(0.95); }
        .end-turn-btn {
            background: #e63946 !important;
            font-weight: bold;
            padding: 8px 24px !important;
        }
        .notifications {
            background: #000000aa;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 12px;
            max-height: 70px;
            overflow-y: auto;
            margin-top: 6px;
        }
        .notification {
            padding: 2px 0;
            border-bottom: 1px solid #3b82f6;
            font-size: 12px;
        }
        .notification .time { color: #888; font-size: 10px; margin-right: 6px; }
        .setup-screen {
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            margin: 20px auto;
        }
        .setup-screen h2 { text-align: center; margin-bottom: 20px; }
        .setup-screen input, .setup-screen select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: none;
            background: #1a365d;
            color: white;
            font-size: 16px;
        }
        .setup-screen .player-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 6px 0;
        }
        .setup-screen .player-row input { flex: 1; }
        .setup-screen .player-row input[type="color"] { width: 50px; height: 40px; padding: 2px; cursor: pointer; }
        .setup-screen button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .setup-screen button:active { transform: scale(0.97); }
        @media (max-width: 600px) {
            .player-info { font-size: 12px; gap: 6px; }
            .building-btn { font-size: 10px; padding: 5px 8px; }
            .action-buttons select, .action-buttons button { font-size: 11px; padding: 5px 8px; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <!-- ЭКРАН НАСТРОЙКИ -->
    <div id="setupScreen" class="setup-screen">
        <h2>🏰 Настройка игры</h2>
        <div id="playersSetup"></div>
        <button onclick="startGame()">🚀 Начать игру</button>
        <div style="text-align:center;margin-top:10px;font-size:13px;color:#888;">
            Минимум 2 игрока, максимум 5
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН (скрыт до старта) -->
    <div id="gameScreen" style="display:none;width:100%;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="panel">
            <div class="top-bar">
                <div class="player-info">
                    <span class="name" id="currentPlayerName">—</span>
                    <span>💰 <span id="moneyDisplay">0</span></span>
                    <span>⚔️ <span id="militaryDisplay">0</span></span>
                    <span>📈 <span id="incomeDisplay">0</span>/с</span>
                </div>
                <div class="turn-indicator" id="turnIndicator">ХОД</div>
            </div>
            <div class="buildings-grid" id="buildingsPanel"></div>
            <div class="action-buttons">
                <select id="targetPlayerSelect"></select>
                <button id="warBtn">⚔️ Война</button>
                <button id="allyBtn">🤝 Союз</button>
                <button id="breakAllyBtn">💔 Разорвать</button>
                <button class="end-turn-btn" id="endTurnBtn">⏭️ Завершить ход</button>
            </div>
            <div class="notifications" id="notifications"></div>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. ПАРАМЕТРЫ КАРТЫ
    // --------------------------------------------------------------
    const CELL_W = 20;
    const CELL_H = 20;
    const MAP_W = 40;
    const MAP_H = 30;
    let canvas, ctx;

    // --------------------------------------------------------------
    // 2. СОСТОЯНИЕ ИГРЫ
    // --------------------------------------------------------------
    let players = [];           // [{ id, name, flagColor, money, militaryStrength, cells, buildings, allies, enemies }]
    let buildings = [];         // [{ id, x, y, type, ownerId, createdAt, lifetime, incomePerSec }]
    let world = [];            // карта: 0-вода, 1-материк, 2-скрытый остров, 3-открытый остров
    let currentPlayerIndex = 0;
    let selectedBuildingType = null;
    let notifications = [];
    let gameRunning = false;
    let turnTimer = null;
    let turnSeconds = 30;
    let turnTimeLeft = 30;
    let buildingIdCounter = 0;

    // Данные о зданиях
    const BUILDINGS_DATA = {
        earth_processor: { name: "🌾 Обрабатыватель", cost: 50, incomePerSec: 1, lifetimeSec: 300, military: 0 },
        military_station: { name: "⚔️ Военная станция", cost: 60, incomePerSec: 0, lifetimeSec: 0, military: 1, costMultiplier: true },
        small_factory: { name: "🏭 Малый завод", cost: 200, incomePerSec: 10, lifetimeSec: 120, military: 0 },
        finder: { name: "🔭 Находитель", cost: 1000, incomePerSec: 0, lifetimeSec: 0, military: 0 },
        factory: { name: "🏭 Завод", cost: 100000, incomePerSec: 250, lifetimeSec: 300, military: 0 },
        mine: { name: "⛏️ Шахта", cost: 100000, incomePerSec: 100, lifetimeSec: 0, military: 0, maxCount: 10 },
        fleet: { name: "⚓ Флот", cost: 50000, incomePerSec: 0, lifetimeSec: 0, military: 0 }
    };

    // --------------------------------------------------------------
    // 3. ГЕНЕРАЦИЯ КАРТЫ
    // --------------------------------------------------------------
    function generateMap() {
        let map = Array(MAP_W).fill().map(() => Array(MAP_H).fill(0));
        let cx = MAP_W/2, cy = MAP_H/2;
        let rx = MAP_W/3, ry = MAP_H/3;
        for (let x=0; x<MAP_W; x++) {
            for (let y=0; y<MAP_H; y++) {
                let dx = (x-cx)/rx, dy = (y-cy)/ry;
                if (dx*dx + dy*dy <= 1) map[x][y] = 1;
            }
        }
        for (let i=0; i<30; i++) {
            let angle = Math.random() * 2 * Math.PI;
            let dist = rx + 5 + Math.random() * 15;
            let ix = Math.floor(cx + dist * Math.cos(angle));
            let iy = Math.floor(cy + dist * Math.sin(angle));
            if (ix>=0 && ix<MAP_W && iy>=0 && iy<MAP_H && map[ix][iy]==0) {
                for (let dx=-1; dx<=1; dx++)
                    for (let dy=-1; dy<=1; dy++)
                        if (ix+dx>=0 && ix+dx<MAP_W && iy+dy>=0 && iy+dy<MAP_H)
                            map[ix+dx][iy+dy] = 2;
            }
        }
        return map;
    }

    function getLandCells(map) {
        let cells = [];
        for (let x=0; x<MAP_W; x++)
            for (let y=0; y<MAP_H; y++)
                if (map[x][y] === 1) cells.push({x,y});
        return cells;
    }

    function partitionLand(landCells, numPlayers) {
        landCells.sort(() => Math.random() - 0.5);
        let chunks = Array(numPlayers).fill().map(() => []);
        landCells.forEach((cell, idx) => chunks[idx % numPlayers].push(cell));
        return chunks;
    }

    // --------------------------------------------------------------
    // 4. НАСТРОЙКА ИГРОКОВ
    // --------------------------------------------------------------
    function setupPlayers() {
        const container = document.getElementById('playersSetup');
        container.innerHTML = '';
        // По умолчанию 3 игрока
        let count = 3;
        for (let i=0; i<count; i++) {
            addPlayerRow(i);
        }
        // Кнопка добавить игрока
        const addBtn = document.createElement('button');
        addBtn.textContent = '+ Добавить игрока';
        addBtn.style.width = 'auto';
        addBtn.style.padding = '6px 16px';
        addBtn.style.fontSize = '14px';
        addBtn.style.marginTop = '6px';
        addBtn.onclick = () => {
            const rows = container.querySelectorAll('.player-row');
            if (rows.length >= 5) { alert('Максимум 5 игроков'); return; }
            addPlayerRow(rows.length);
        };
        container.appendChild(addBtn);
    }

    function addPlayerRow(index) {
        const container = document.getElementById('playersSetup');
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `
            <input type="text" placeholder="Имя игрока ${index+1}" value="Игрок ${index+1}">
            <input type="color" value="#${Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}">
            <button onclick="this.parentElement.remove()" style="background:#e63946;padding:4px 10px;font-size:14px;border:none;border-radius:8px;color:white;cursor:pointer;">✕</button>
        `;
        container.insertBefore(row, container.lastElementChild);
    }

    // --------------------------------------------------------------
    // 5. СТАРТ ИГРЫ
    // --------------------------------------------------------------
    function startGame() {
        const rows = document.querySelectorAll('#playersSetup .player-row');
        if (rows.length < 2) { alert('Нужно минимум 2 игрока!'); return; }

        const playersData = [];
        for (let row of rows) {
            const inputs = row.querySelectorAll('input');
            const name = inputs[0].value.trim() || `Игрок ${playersData.length+1}`;
            const color = inputs[1].value;
            playersData.push({ name, flagColor: color });
        }

        // Инициализация мира
        world = generateMap();
        const land = getLandCells(world);
        const chunks = partitionLand(land, playersData.length);

        players = playersData.map((p, idx) => ({
            id: 'p' + idx,
            name: p.name,
            flagColor: p.flagColor,
            money: 50,
            militaryStrength: 0,
            cells: chunks[idx] || [],
            buildings: [],
            allies: [],
            enemies: []
        }));

        buildings = [];
        buildingIdCounter = 0;
        currentPlayerIndex = 0;
        notifications = [];
        gameRunning = true;
        turnTimeLeft = turnSeconds;

        // Показать игровой экран
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';

        // Настроить canvas
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        canvas.width = MAP_W * CELL_W;
        canvas.height = MAP_H * CELL_H;

        // Запустить таймеры
        startTurnTimer();
        startEconomyLoop();
        startFinderLoop();
        startRebellionLoop();

        // Обновить UI
        updateUI();
        render();
        addNotification('🎮 Игра началась! Первый ход у ' + getCurrentPlayer().name);
    }

    // --------------------------------------------------------------
    // 6. ПОЛУЧЕНИЕ ТЕКУЩЕГО ИГРОКА
    // --------------------------------------------------------------
    function getCurrentPlayer() {
        return players[currentPlayerIndex];
    }

    // --------------------------------------------------------------
    // 7. ТАЙМЕР ХОДА
    // --------------------------------------------------------------
    function startTurnTimer() {
        if (turnTimer) clearInterval(turnTimer);
        turnTimeLeft = turnSeconds;
        updateTurnDisplay();

        turnTimer = setInterval(() => {
            turnTimeLeft--;
            updateTurnDisplay();
            if (turnTimeLeft <= 0) {
                endTurn();
            }
        }, 1000);
    }

    function updateTurnDisplay() {
        const indicator = document.getElementById('turnIndicator');
        const player = getCurrentPlayer();
        indicator.textContent = `⏳ ${turnTimeLeft}с | ${player.name}`;
        indicator.style.background = player.flagColor || '#ffd700';
        indicator.style.color = '#0a2f44';
    }

    function endTurn() {
        if (!gameRunning) return;
        if (turnTimer) clearInterval(turnTimer);

        // Проверка на победу
        const activePlayers = players.filter(p => p.cells.length > 0);
        if (activePlayers.length <= 1) {
            gameOver(activePlayers[0]);
            return;
        }

        // Переход к следующему игроку
        do {
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        } while (players[currentPlayerIndex].cells.length === 0 && players.length > 1);

        addNotification(`🔄 Ход передан ${getCurrentPlayer().name}`);
        updateUI();
        render();
        startTurnTimer();
    }

    // --------------------------------------------------------------
    // 8. ЭКОНОМИКА (фоновая)
    // --------------------------------------------------------------
    function startEconomyLoop() {
        setInterval(() => {
            if (!gameRunning) return;
            // Доход для всех игроков каждую секунду
            for (let p of players) {
                let income = 0;
                for (let bId of p.buildings) {
                    const b = buildings.find(bld => bld.id === bId);
                    if (b && b.incomePerSec) income += b.incomePerSec;
                }
                p.money += income;
            }
            // Удаление временных зданий
            const now = Date.now();
            buildings = buildings.filter(b => {
                if (b.lifetime && b.lifetime < now) {
                    const owner = players.find(p => p.id === b.ownerId);
                    if (owner) owner.buildings = owner.buildings.filter(id => id !== b.id);
                    return false;
                }
                return true;
            });
            // Обновляем UI
            updateUI();
            render();
            checkWinCondition();
        }, 1000);
    }

    // --------------------------------------------------------------
    // 9. НАХОДИТЕЛЬ (открывает острова)
    // --------------------------------------------------------------
    function startFinderLoop() {
        setInterval(() => {
            if (!gameRunning) return;
            for (let p of players) {
                for (let bId of p.buildings) {
                    const b = buildings.find(bld => bld.id === bId);
                    if (b && b.type === 'finder') {
                        // Шанс 5% найти остров
                        if (Math.random() < 0.05) {
                            // Ищем ближайший скрытый остров
                            let found = false;
                            for (let rad=1; rad<15; rad++) {
                                for (let dx=-rad; dx<=rad; dx++) {
                                    for (let dy=-rad; dy<=rad; dy++) {
                                        const nx = b.x + dx;
                                        const ny = b.y + dy;
                                        if (nx>=0 && nx<MAP_W && ny>=0 && ny<MAP_H && world[nx][ny] === 2) {
                                            world[nx][ny] = 3;
                                            // Нефть?
                                            if (Math.random() < 0.2) {
                                                p.money *= 2;
                                                addNotification(`🛢️ ${p.name} нашёл нефть! Деньги удвоены!`);
                                            }
                                            addNotification(`🔭 ${p.name} открыл новый остров!`);
                                            found = true;
                                            break;
                                        }
                                    }
                                    if (found) break;
                                }
                                if (found) break;
                            }
                        }
                    }
                }
            }
            render();
        }, 3000);
    }

    // --------------------------------------------------------------
    // 10. ВОССТАНИЕ (каждые 3 минуты)
    // --------------------------------------------------------------
    function startRebellionLoop() {
        setInterval(() => {
            if (!gameRunning || players.length >= 6) return;
            const weakPlayers = players.filter(p => p.militaryStrength < 10 && p.cells.length > 10);
            if (weakPlayers.length === 0) return;

            const rebel = weakPlayers[Math.floor(Math.random() * weakPlayers.length)];
            const rebelCells = rebel.cells;
            const taken = rebelCells.slice(0, Math.floor(rebelCells.length / 3));
            if (taken.length < 3) return;

            const newId = 'p' + players.length;
            const newPlayer = {
                id: newId,
                name: `Восстание ${Math.floor(Math.random()*100)}`,
                flagColor: `hsl(${Math.random()*360}, 70%, 60%)`,
                money: 30,
                militaryStrength: 0,
                cells: taken,
                buildings: [],
                allies: [],
                enemies: [rebel.id]
            };
            rebel.enemies.push(newId);
            rebel.cells = rebel.cells.filter(c => !taken.some(t => t.x===c.x && t.y===c.y));
            players.push(newPlayer);

            addNotification(`⚠️ Восстание! ${newPlayer.name} отделился от ${rebel.name}`);
            render();
            updateUI();
        }, 180000);
    }

    // --------------------------------------------------------------
    // 11. ОТРИСОВКА
    // --------------------------------------------------------------
    function render() {
        if (!ctx || !world.length) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let x=0; x<MAP_W; x++) {
            for (let y=0; y<MAP_H; y++) {
                const type = world[x]?.[y] || 0;
                let color = '#1e3a5f';
                if (type === 1) color = '#2d6a4f';
                else if (type === 2) color = '#6c757d';
                else if (type === 3) color = '#52b788';
                ctx.fillStyle = color;
                ctx.fillRect(x*CELL_W, y*CELL_W, CELL_W-1, CELL_W-1);

                // Владелец клетки
                const owner = players.find(p => p.cells.some(c => c.x===x && c.y===y));
                if (owner) {
                    ctx.strokeStyle = owner.flagColor;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x*CELL_W, y*CELL_W, CELL_W-1, CELL_W-1);
                }
            }
        }

        // Здания
        for (let b of buildings) {
            let col = '#aaa';
            if (b.type === 'earth_processor') col = '#b68b40';
            else if (b.type === 'military_station') col = '#e63946';
            else if (b.type === 'small_factory') col = '#4d908e';
            else if (b.type === 'finder') col = '#9c27b0';
            else if (b.type === 'factory') col = '#ffb703';
            else if (b.type === 'mine') col = '#3e5c76';
            else if (b.type === 'fleet') col = '#219ebc';
            ctx.fillStyle = col;
            ctx.fillRect(b.x*CELL_W, b.y*CELL_W, CELL_W-1, CELL_W-1);
            ctx.fillStyle = 'white';
            ctx.font = "9px sans-serif";
            ctx.fillText(b.type[0].toUpperCase(), b.x*CELL_W+5, b.y*CELL_W+13);
        }
    }

    // --------------------------------------------------------------
    // 12. UI
    // --------------------------------------------------------------
    function updateUI() {
        const player = getCurrentPlayer();
        if (!player) return;

        document.getElementById('currentPlayerName').textContent = player.name;
        document.getElementById('currentPlayerName').style.color = player.flagColor;
        document.getElementById('moneyDisplay').textContent = Math.floor(player.money);
        document.getElementById('militaryDisplay').textContent = player.militaryStrength;

        let income = 0;
        for (let bId of player.buildings) {
            const b = buildings.find(bld => bld.id === bId);
            if (b && b.incomePerSec) income += b.incomePerSec;
        }
        document.getElementById('incomeDisplay').textContent = income;

        // Кнопки построек
        const panel = document.getElementById('buildingsPanel');
        panel.innerHTML = '';
        for (let [type, data] of Object.entries(BUILDINGS_DATA)) {
            const btn = document.createElement('button');
            btn.className = 'building-btn';
            let cost = data.cost;
            if (type === 'military_station') {
                const count = player.buildings.filter(id => {
                    const b = buildings.find(bld => bld.id === id);
                    return b && b.type === 'military_station';
                }).length;
                cost = data.cost * Math.pow(2, count);
            }
            const canAfford = player.money >= cost;
            btn.textContent = `${data.name} (${cost}💰)`;
            btn.disabled = !canAfford;
            btn.onclick = (e) => {
                e.stopPropagation();
                selectedBuildingType = type;
                addNotification(`Выбрано: ${data.name}. Кликните на свою землю`);
            };
            panel.appendChild(btn);
        }

        // Список игроков для войн/союзов
        const select = document.getElementById('targetPlayerSelect');
        select.innerHTML = '';
        players.forEach(p => {
            if (p.id !== player.id) {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                select.appendChild(opt);
            }
        });

        updateTurnDisplay();
    }

    // --------------------------------------------------------------
    // 13. УВЕДОМЛЕНИЯ
    // --------------------------------------------------------------
    function addNotification(msg) {
        notifications.unshift({ text: msg, time: Date.now() });
        if (notifications.length > 10) notifications.pop();
        renderNotifications();
    }

    function renderNotifications() {
        const div = document.getElementById('notifications');
        div.innerHTML = notifications.map(n =>
            `<div class="notification"><span class="time">${new Date(n.time).toLocaleTimeString()}</span>${n.text}</div>`
        ).join('');
    }

    // --------------------------------------------------------------
    // 14. КЛИК ПО КАРТЕ
    // --------------------------------------------------------------
    function handleCanvasClick(e) {
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        const gridX = Math.floor(canvasX / CELL_W);
        const gridY = Math.floor(canvasY / CELL_H);
        if (gridX < 0 || gridX >= MAP_W || gridY < 0 || gridY >= MAP_H) return;

        const player = getCurrentPlayer();

        // Строительство
        if (selectedBuildingType) {
            const isMine = player.cells.some(c => c.x === gridX && c.y === gridY);
            if (!isMine) {
                addNotification('❌ Это не ваша земля!');
                selectedBuildingType = null;
                return;
            }

            const data = BUILDINGS_DATA[selectedBuildingType];
            let cost = data.cost;
            if (selectedBuildingType === 'military_station') {
                const count = player.buildings.filter(id => {
                    const b = buildings.find(bld => bld.id === id);
                    return b && b.type === 'military_station';
                }).length;
                cost = data.cost * Math.pow(2, count);
            }
            if (selectedBuildingType === 'mine') {
                const count = player.buildings.filter(id => {
                    const b = buildings.find(bld => bld.id === id);
                    return b && b.type === 'mine';
                }).length;
                if (count >= 10) {
                    addNotification('❌ Максимум 10 шахт');
                    selectedBuildingType = null;
                    return;
                }
            }
            if (player.money < cost) {
                addNotification('❌ Не хватает денег');
                selectedBuildingType = null;
                return;
            }

            // Строим
            const newBuilding = {
                id: 'b' + (buildingIdCounter++),
                x: gridX,
                y: gridY,
                type: selectedBuildingType,
                ownerId: player.id,
                createdAt: Date.now(),
                lifetime: data.lifetimeSec ? Date.now() + data.lifetimeSec * 1000 : null,
                incomePerSec: data.incomePerSec || 0
            };
            buildings.push(newBuilding);
            player.buildings.push(newBuilding.id);
            player.money -= cost;

            if (selectedBuildingType === 'military_station') {
                player.militaryStrength += 1;
            }

            addNotification(`✅ Построено ${data.name}`);
            selectedBuildingType = null;
            updateUI();
            render();
            return;
        }

        // Атака на здание
        const targetBuilding = buildings.find(b =>
            b.x === gridX && b.y === gridY && b.ownerId !== player.id
        );
        if (targetBuilding) {
            const defender = players.find(p => p.id === targetBuilding.ownerId);
            if (!defender) return;

            if (player.allies.includes(defender.id)) {
                addNotification('❌ Нельзя атаковать союзника!');
                return;
            }

            if (player.militaryStrength > defender.militaryStrength) {
                // Захват
                const oldOwner = defender;
                const newOwner = player;
                targetBuilding.ownerId = newOwner.id;
                oldOwner.buildings = oldOwner.buildings.filter(id => id !== targetBuilding.id);
                newOwner.buildings.push(targetBuilding.id);

                if (targetBuilding.type === 'military_station') {
                    newOwner.militaryStrength += 1;
                    oldOwner.militaryStrength -= 1;
                }

                addNotification(`🏴 Захвачено ${targetBuilding.type} у ${defender.name}!`);
                updateUI();
                render();
            } else {
                addNotification(`💥 Не удалось захватить! Ваша сила ${player.militaryStrength} < ${defender.militaryStrength}`);
            }
            return;
        }
    }

    function setupActionButtons() {
        document.getElementById('warBtn').onclick = () => {
            const targetId = document.getElementById('targetPlayerSelect').value;
            if (!targetId) return;
            const me = getCurrentPlayer();
            const target = players.find(p => p.id === targetId);
            if (!target) return;

            if (me.allies.includes(targetId)) {
                addNotification('❌ Сначала разорвите союз!');
                return;
            }
            if (!me.enemies.includes(targetId)) {
                me.enemies.push(targetId);
                target.enemies.push(me.id);
                addNotification(`⚔️ Война между ${me.name} и ${target.name}!`);
                updateUI();
            }
        };

        document.getElementById('allyBtn').onclick = () => {
            const targetId = document.getElementById('targetPlayerSelect').value;
            if (!targetId) return;
            const me = getCurrentPlayer();
            const target = players.find(p => p.id === targetId);
            if (!target) return;

            if (me.enemies.includes(targetId)) {
                addNotification('❌ Сначала заключите мир (пока нельзя)');
                return;
            }
            if (!me.allies.includes(targetId)) {
                me.allies.push(targetId);
                target.allies.push(me.id);
                addNotification(`🤝 Союз между ${me.name} и ${target.name}!`);
                updateUI();
            }
        };

        document.getElementById('breakAllyBtn').onclick = () => {
            const targetId = document.getElementById('targetPlayerSelect').value;
            if (!targetId) return;
            const me = getCurrentPlayer();
            const target = players.find(p => p.id === targetId);
            if (!target) return;

            if (me.allies.includes(targetId)) {
                me.allies = me.allies.filter(id => id !== targetId);
                target.allies = target.allies.filter(id => id !== me.id);
                addNotification(`💔 Союз между ${me.name} и ${target.name} разорван`);
                updateUI();
            }
        };

        document.getElementById('endTurnBtn').onclick = endTurn;
    }

            gameOver(active[0]);
        }
    }
